name: Build UZAKDUR APK

on:
  push:
    branches: [ main, 'claude/**' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      - run: flutter pub get
      # Kalıcı release imzası: secret yoksa (ör. bir fork'ta) bu adım atlanır
      # ve build.gradle debug imzasına düşer — ama main/claude/** dallarında
      # bu secret'lar tanımlıysa APK her zaman aynı anahtarla imzalanır, bu
      # sayede kullanıcılar üzerine "güncelleme" olarak kurabilir.
      - name: Release keystore'u decode et
        if: ${{ secrets.UZAKDUR_KEYSTORE_BASE64 != '' }}
        env:
          UZAKDUR_KEYSTORE_BASE64: ${{ secrets.UZAKDUR_KEYSTORE_BASE64 }}
        run: echo "$UZAKDUR_KEYSTORE_BASE64" | base64 -d > android/app/uzakdur-release.jks
      - run: flutter build apk --release --dart-define=APP_BUILD_NUMBER=${{ github.run_number }}
        env:
          UZAKDUR_KEYSTORE_PASSWORD: ${{ secrets.UZAKDUR_KEYSTORE_PASSWORD }}
          UZAKDUR_KEY_ALIAS: ${{ secrets.UZAKDUR_KEY_ALIAS }}
          UZAKDUR_KEY_PASSWORD: ${{ secrets.UZAKDUR_KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: uzakdur-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
      # main'e her push'ta, sabit ve süresi dolmayan bir indirme linki (Actions
      # artifact'larının aksine 30 günde silinmiyor, kimlik doğrulama
      # gerektirmiyor) için bir GitHub Release oluşturulup APK'ya eklenir.
      # Uygulama da açılışta bunu kontrol edip güncelleme olduğunda haber verir.
      - name: Yayın oluştur (main için)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: UZAKDUR build ${{ github.run_number }}
          make_latest: true
          files: build/app/outputs/flutter-apk/app-release.apk
