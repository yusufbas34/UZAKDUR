def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '2.0'

apply plugin: 'com.android.application'
apply plugin: 'com.google.gms.google-services'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

// Release imzalama: CI, sabit bir keystore'u ortam değişkenlerinden
// (GitHub Actions secrets) okuyup android/app/uzakdur-release.jks olarak
// decode eder. Bu dosya/şifreler repoya asla commit edilmez (public repo).
// Değişkenler yoksa (ör. yerel geliştirme) debug imzasına düşer — bu durumda
// üretilen APK, gerçek release ile aynı imzayı taşımaz ve "update" olarak
// kurulamaz; sadece CI'daki release imzası kalıcı/güncellenebilir olandır.
def releaseKeystoreFile = file("uzakdur-release.jks")
def hasReleaseSigning = releaseKeystoreFile.exists() &&
        System.getenv("UZAKDUR_KEYSTORE_PASSWORD") != null

android {
    namespace "com.uzakdur.app"
    compileSdkVersion 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId "com.uzakdur.app"
        minSdkVersion 23
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    signingConfigs {
        if (hasReleaseSigning) {
            release {
                storeFile releaseKeystoreFile
                storePassword System.getenv("UZAKDUR_KEYSTORE_PASSWORD")
                keyAlias System.getenv("UZAKDUR_KEY_ALIAS") ?: "uzakdur"
                keyPassword System.getenv("UZAKDUR_KEY_PASSWORD") ?: System.getenv("UZAKDUR_KEYSTORE_PASSWORD")
            }
        }
    }

    buildTypes {
        release {
            signingConfig hasReleaseSigning ? signingConfigs.release : signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation platform('com.google.firebase:firebase-bom:32.7.0')
    implementation 'com.google.firebase:firebase-analytics'
    // Silme koruması: UzakdurDeviceAdminReceiver, uygulama silinmeye
    // çalışıldığı anı Flutter motoru hiç çalışmadan native koddan bildirir —
    // bu yüzden Firebase Database'in native SDK'sına doğrudan ihtiyaç var
    // (firebase_database Flutter eklentisi zaten transitif olarak getiriyor,
    // burada BOM ile aynı sürüme sabitlemek için açıkça bildiriliyor).
    implementation 'com.google.firebase:firebase-database'
    implementation 'androidx.multidex:multidex:2.0.1'
}
