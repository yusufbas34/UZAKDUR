def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) throw new GradleException("Flutter SDK bulunamadı.")f

apply plugin: 'com.android.application'
apply plugin: 'com.google.gms.google-services'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

android {
    namespace "com.uzakdur.app"
    compileSdkVersion 34
    ndkVersion flutter.ndkVersion
    compileOptions { sourceCompatibility JavaVersion.VERSION_1_8; targetCompatibility JavaVersion.VERSION_1_8 }
    defaultConfig {
        applicationId "com.uzakdur.app"
        minSdkVersion 23
        targetSdkVersion 34
        versionCode 1
        versionName "2.0"
        multiDexEnabled true
    }
    buildTypes {
        release { signingConfig signingConfigs.debug; minifyEnabled false }
    }
}

flutter { source '../..' }

dependencies {
    implementation platform('com.google.firebase:firebase-bom:32.7.0')
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'androidx.multidex:multidex:2.0.1'
}
